name: CD — API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/domain/**'
      - 'packages/db/**'
      - 'packages/observability/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/cd-api.yml'

concurrency:
  group: cd-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push image to ACR
        run: |
          az acr build \
            --registry previewqaacr \
            --image previewqa-api:${{ github.sha }} \
            --image previewqa-api:latest \
            --file apps/api/Dockerfile \
            .

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name previewqa-api \
            --resource-group preview-qa-agent-rg \
            --image previewqaacr.azurecr.io/previewqa-api:${{ github.sha }}

      - name: Verify deployment
        run: |
          az containerapp revision list \
            --name previewqa-api \
            --resource-group preview-qa-agent-rg \
            --query "[0].{name:name,active:properties.active,replicas:properties.replicas}" \
            -o table
